<script>

// ✅ نام همه عکس‌هایی که داخل پوشه images هستند
// اگر عکس جدید اضافه کردی فقط داخل این لیست اضافه کن
const images = [];

const imageFiles = [
"IMG-20260216-WA0000.jpg",
"IMG-20260216-WA0001.jpg",
"IMG-20260216-WA0003.jpg",
"IMG-20260216-WA0004.jpg",
"IMG-20260216-WA0006.jpg",
"IMG-20260216-WA0007.jpg",
"IMG-20260216-WA0008.jpg",
"IMG-20260216-WA0009.jpg",
"IMG-20260216-WA0012.jpg",
"IMG-20260216-WA0013.jpg",
"IMG-20260216-WA0014.jpg",
"IMG-20260216-WA0015.jpg",
"IMG-20260216-WA0016.jpg",
"IMG-20260216-WA0017.jpg",
"IMG-20260216-WA0018.jpg",
"IMG-20260224-WA0000.jpg",
"IMG_20260227_133056.jpg"
];

imageFiles.forEach(file=>{
images.push("images/" + file);
});

const gallery = document.getElementById("galleryBox");

images.forEach(img => {

let image = document.createElement("img");
image.src = img;
image.onclick = () => openImage(img);

gallery.appendChild(image);

});

function openImage(src){
document.getElementById("modal").style.display = "flex";
document.getElementById("modalImg").src = src;
}

function closeImage(){
document.getElementById("modal").style.display = "none";
}

</script>
